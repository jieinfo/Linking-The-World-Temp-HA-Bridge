name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Check Python syntax
        run: python -m py_compile bridge.py test_protocol.py linking_the_world_temp_ha_bridge_addon/bridge.py linking_the_world_temp_ha_bridge_addon/addon_entrypoint.py
      - name: Run protocol tests
        run: python -m unittest -v
      - name: Validate add-on metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          addon = yaml.safe_load(Path("linking_the_world_temp_ha_bridge_addon/config.yaml").read_text())
          repository = yaml.safe_load(Path("repository.yaml").read_text())
          changelog = Path("linking_the_world_temp_ha_bridge_addon/CHANGELOG.md").read_text()
          assert addon["slug"] == "linking_the_world_temp_ha_bridge"
          assert addon["version"]
          assert repository["name"]
          assert f"## {addon['version']}" in changelog
          PY
